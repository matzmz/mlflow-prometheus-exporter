name: Build and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 1.0)"
        default: "1.0"
        type: string
        required: false
  workflow_call:
    inputs:
      version:
        description: "Image version tag (e.g. 1.0)"
        default: "1.0"
        type: string
        required: false

env:
  # ghcr.io requires a lowercase repository path.
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push-docker-image:
    name: Build Docker image and push to ghcr.io
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t "${IMAGE_LC}:${{ github.sha }}" .
          echo "IMAGE_LC=${IMAGE_LC}" >> "$GITHUB_ENV"

      - name: Smoke-test the image
        run: |
          docker run --rm -d -p 8000:8000 "${IMAGE_LC}:${{ github.sha }}"
          sleep 5
          curl -I --fail http://localhost:8000/metrics

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_LC }}:${{ github.sha }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to ghcr.io
        run: |
          docker tag "${IMAGE_LC}:${{ github.sha }}" "${IMAGE_LC}:${{ inputs.version }}"
          docker tag "${IMAGE_LC}:${{ github.sha }}" "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${{ inputs.version }}"
          docker push "${IMAGE_LC}:latest"

