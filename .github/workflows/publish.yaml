name: Build and Publish

on:
  workflow_dispatch:
  workflow_call:

env:
  # ghcr.io requires a lowercase repository path.
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push-docker-image:
    name: Build Docker image and push to ghcr.io
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read package version
        run: |
          PACKAGE_VERSION=$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          print(data["project"]["version"])
          PY
          )
          IMAGE_TAG="${PACKAGE_VERSION}-${GITHUB_RUN_NUMBER}"
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker build -t "${IMAGE_LC}:${{ github.sha }}" .
          echo "IMAGE_LC=${IMAGE_LC}" >> "$GITHUB_ENV"

      - name: Smoke-test the image
        run: |
          CID=$(docker run --rm -d \
            -e MLFLOW_TRACKING_URI=/tmp/mlruns \
            -p 8000:8000 \
            "${IMAGE_LC}:${{ github.sha }}")
          sleep 10
          curl --fail http://localhost:8000/healthz
          curl --fail http://localhost:8000/readyz
          curl --fail http://localhost:8000/metrics
          docker stop "$CID"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_LC }}:${{ github.sha }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to ghcr.io
        run: |
          docker tag "${IMAGE_LC}:${{ github.sha }}" "${IMAGE_LC}:${IMAGE_TAG}"
          docker tag "${IMAGE_LC}:${{ github.sha }}" "${IMAGE_LC}:${PACKAGE_VERSION}"
          docker tag "${IMAGE_LC}:${{ github.sha }}" "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${IMAGE_TAG}"
          docker push "${IMAGE_LC}:${PACKAGE_VERSION}"
          docker push "${IMAGE_LC}:latest"
