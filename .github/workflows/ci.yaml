name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tox
        run: pip install tox

      - name: Run lint
        run: tox -e lint

  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tox
        run: pip install tox

      - name: Run unit tests
        run: tox -e unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7

  integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tox
        run: pip install tox

      - name: Run integration tests
        run: tox -e integration

